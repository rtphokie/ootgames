<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OOT Games</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #101010;
            --line: #3b3b3b;
            --text: #f5f5f5;
            --accent: #ffd400;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Menlo", "Consolas", monospace;
        }
        .card {
            border: 1px solid var(--line);
            background: var(--panel);
            padding: 20px 24px;
        }
        a {
            color: var(--text);
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
        }
        a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="/gameview">MLB Scoreboard</a>
    </div>
    <div class="card">
        <a href="/otg">MLB Scoreboard (simpler)</a>
    </div>
</body>
</html>
