<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MLB Standings</title>
    <script>
        function updateRefreshLine(refreshMs) {
            const bar = document.getElementById("standings-refresh-bar");
            if (!bar) return;

            const start = Date.now();
            const timer = setInterval(function () {
                const elapsed = Date.now() - start;
                const remainingMs = Math.max(0, refreshMs - elapsed);
                const percent = (remainingMs / refreshMs) * 100;
                bar.style.width = percent.toFixed(2) + "%";
                if (remainingMs <= 0) {
                    clearInterval(timer);
                }
            }, 100);
        }

        (function () {
            const url = new URL(window.location.href);
            const hasTimezone = url.searchParams.has("tz") || url.searchParams.has("timezone");
            if (hasTimezone) return;

            const browserTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            if (!browserTimezone) return;

            url.searchParams.set("tz", browserTimezone);
            window.location.replace(url.toString());
        }());

        window.addEventListener("DOMContentLoaded", function () {
            const refreshMs = 15000;
            updateRefreshLine(refreshMs);
            setTimeout(function () {
                window.location.reload();
            }, refreshMs);
        });
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='standings.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='refresh_bar.css') }}">
</head>
<body>
    <div class="refresh-wrap" aria-hidden="true">
        <div class="refresh-bar" aria-hidden="true">
            <div id="standings-refresh-bar" class="refresh-bar-fill"></div>
        </div>
    </div>
    <div class="wrap">
        <div class="header-row">
            <div>
                <div class="eyebrow">{{ season }} Standings</div>
            </div>
            <a class="return-link" href="/?tz={{ timezone }}" aria-label="Back to games">&#8617;</a>
        </div>

        <div class="division-grid">
            {% for division in divisions %}
                <section class="division-card" aria-label="{{ division.name }} standings">
                    <h2>{{ division.name }}</h2>
                    <div class="team-list">
                        {% for team in division.teams %}
                            <div class="team-row">
                                <div class="team-main">
                                    <img class="team-logo" src="{{ team.logo_url }}" alt="{{ team.name }} logo" onerror="this.style.display='none'">
                                    <span class="team-name">{{ team.name }}</span>
                                </div>
                                <span class="team-record">{{ team.record }}</span>
                            </div>
                        {% endfor %}
                    </div>
                </section>
            {% endfor %}
        </div>
    </div>
</body>
</html>
